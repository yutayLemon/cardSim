<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>physics cards</title>
  </head>
  <body>
    <div id="app"></div>

   <script type="module" src="/src/global.js"></script>
<!----------------PHYSICS UI-->
  <div id="physics-ui">
  <div class="panel">
    <h2>Physics Debug</h2>

    <label><input type="checkbox" id="toggle-arrow" value="arrow" checked="true"> Show debug arrows</label>
    <label><input type="checkbox" id="toggle-points" value="points" checked="true"> Show debug points</label>
    <label><input type="checkbox" id="toggle-selection" value="selection" checked="true"> debug selection on</label>
    <label><input type="checkbox" id="toggle-bounding" value="bouding" checked="true"> bounding boxes</label>
    <label><input type="button" id="toggle-flow" value="flow"> camera flow</label>
    
    <input type="file" accept=".json" id="uploadFile"><input type="button" id="importFile" value="import">
    <input type="button" id="exportFile" value="export">
    <br>
    <input type="button" id="video-start" value="start recording">
    <input type="button" id="video-stop" value="stop recording">
    <a id="video-download">download</a>

    <div>
      <p>cardMdl offset</p>
      <input id="crdMdlX" type="number" placeholder="x">
      <input id="crdMdlY" type="number" placeholder="y">
      <input id="crdMdlZ" type="number" placeholder="z">
      <input type="button" onclick="changeMdlVal()">
    </div>
    <script>
      function changeMdlVal(){
        for(const item of window.simulation.objects){
          console.log(item.class);
          if(item.class == 'card'){
            let x = document.getElementById('crdMdlX').value;
            let y = document.getElementById('crdMdlY').value;
            let z = document.getElementById('crdMdlZ').value;
            item.mdlOffset.set(x,y,z);
          }
        }
      }
    </script>

    <hr>

    <div class="section">
      <button class="toggle-btn" data-target="object-section">▶ Objects</button>
      <div class="content" id="object-section">
        <p>Selected: <span id="selected-name">None</span></p>
        <p>Type: <span id="selected-type">—</span></p>
      </div>
    </div>

    <div class="section">
      <button class="toggle-btn" data-target="position-section">▶ Position & Velocity</button>
      <div class="content" id="position-section">
        <p>Position: <span id="pos"></span></p>
        <p>Velocity: <span id="vel"></span></p>
        <p>Rotation: <span id="rot"></span></p>
      </div>
    </div>
  </div>
</div>
    <script type="module" src="/src/ctrlPanel.js"></script>
<!----------------PHYSICS UI-->

    <script type="module" src="/src/sceneSetUp.js"></script>
    <script type="module" src="/src/index.js"></script>
    <script type="module" src="/src/physicalObj.js"></script>
    <script type="module" src="/src/boxObj.js"></script>
    <script type="module" src="/src/keyInput.js"></script>
    <script type="module" src="/src/debug.js"></script>
  </body>
</html>
